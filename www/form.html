<html lang="ru">
  <head>
    <meta charset="UTF-8">
    <style>
      form {
        width: 300px;
        margin: 20px auto;
        padding: 10px;
        border: 1px solid #ccc;
        border-radius: 8px;
        opacity: 0;
        transition: opacity 1s;
      }
      form.loaded {
        opacity: 1;
      }
      input, select, button {
        margin: 5px 0;
        padding: 5px;
      }
      button {
        background: #4caf50;
        color: white;
        border-radius: 4px;
      }
    </style>
  </head>
  <body>
    <form id="myForm" action="process.php" method="POST">
      <input type="text" name="username" placeholder="Введите имя" />
       <div style="display: flex; align-items: center; margin: 5px 0;">
	  <input type="text" name="age" placeholder="Введите возраст" />
        <span style="margin-right: 10px;">Тема:</span>
        <select name="theme" style="flex-grow: 1;">
            <option value="facts">Факты за 100</option>
            <option value="cars">Авто за 200</option>
            <option value="jokes">Шутки за 300</option>
        </select>
    </div>
      <div class="checkbox-container">
        <input type="checkbox" name="prize_bool" id="type_pay" />
        <label for="prize_bool">Нужен приз?</label>
    </div>
      <input type="radio" name="difficulty" value="a" /> Легко<br />
      <input type="radio" name="difficulty" value="b" /> Сложно<br />
	  <input type="radio" name="difficulty" value="c" /> Прикладной математик<br />
      <button type="submit">Отправить</button>
    </form>

    <div id="result"></div>

    <script>
      window.onload = function () {
        document.querySelector("form").classList.add("loaded");
      };
      document.getElementById("myForm").addEventListener("submit", function(e){
    const username = document.querySelector("[name='username']").value;
    alert("Вы ввели имя: " + username);
        });
    </script>
  </body>
</html>
